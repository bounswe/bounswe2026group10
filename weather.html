<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <title>Weather</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      min-height: 100vh;
      background: linear-gradient(135deg, #1a1a2e, #16213e, #0f3460);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      color: white;
    }

    .card {
      background: rgba(255,255,255,0.1);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 24px;
      padding: 48px;
      text-align: center;
      max-width: 400px;
      width: 100%;
    }

    .city { font-size: 1rem; opacity: 0.7; letter-spacing: 0.2em; text-transform: uppercase; margin-bottom: 8px; }
    .icon { font-size: 5rem; margin: 16px 0; }
    .temp { font-size: 5rem; font-weight: 700; margin-bottom: 32px; }

    .stats {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      margin-bottom: 32px;
    }

    .stat {
      background: rgba(255,255,255,0.08);
      border-radius: 12px;
      padding: 16px;
    }

    .stat-label { font-size: 0.75rem; opacity: 0.6; text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 6px; }
    .stat-value { font-size: 1.4rem; font-weight: 600; }

    .back {
      color: rgba(255,255,255,0.6);
      text-decoration: none;
      font-size: 0.875rem;
      transition: color 150ms;
    }

    .back:hover { color: white; }
  </style>
</head>
<body>
  <div class="card">
    <p class="city">📍 Istanbul</p>
    <div class="icon" id="icon">⛅</div>
    <div class="temp"><span id="temp"></span>°C</div>
    <div class="stats">
      <div class="stat">
        <div class="stat-label">💨 Wind</div>
        <div class="stat-value"><span id="wind"></span> <small>km/h</small></div>
      </div>
      <div class="stat">
        <div class="stat-label">💧 Humidity</div>
        <div class="stat-value"><span id="humidity"></span><small>%</small></div>
      </div>
    </div>
    <a href="index.html" class="back">← Back</a>
  </div>

  <script>
    const p = new URLSearchParams(window.location.search);
    const temp = parseFloat(p.get("temp"));

    document.getElementById("temp").textContent = temp;
    document.getElementById("wind").textContent = p.get("wind");
    document.getElementById("humidity").textContent = p.get("humidity");

    // icon based on temperature
    const icon = temp <= 0 ? "❄️" : temp <= 15 ? "🌥️" : temp <= 25 ? "⛅" : "☀️";
    document.getElementById("icon").textContent = icon;
  </script>
</body>
</html>
