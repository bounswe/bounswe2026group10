name: Label Based Assignee

on:
  issues:
    types: [labeled]
  pull_request:
    types: [labeled]

permissions:
  issues: write
  pull-requests: write

jobs:
  assign-based-on-label:
    runs-on: ubuntu-latest
    steps:
      - name: Determine assignee(s) from label
        uses: actions/github-script@v7
        with:
          script: |
            const labelName = context.payload.label?.name?.toLowerCase();
            const issueNumber = context.issue.number;

            // Update usernames below with real GitHub usernames in your repo.
            // Keys are label names (case-insensitive because we lower-case incoming label).
            const mapping = {
              'area: backend': ['Furkan-Coban', 'barankrkmz', 'ByRock010'],
              'area: frontend': ['yunusyucesoy', 'Berkayacer13'],
              'area: mobile': ['hckoseoglu', 'yegeb']
            };

            if (!labelName) {
              core.info('No label in payload, skipping.');
              return;
            }

            const assignees = mapping[labelName];

            if (!assignees || assignees.length === 0) {
              core.info(`No assignment rule found for label: ${labelName}`);
              return;
            }

            core.info(`Label: ${labelName} -> Assigning: ${assignees.join(', ')}`);

            await github.rest.issues.addAssignees({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
              assignees
            });
