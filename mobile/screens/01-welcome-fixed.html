<style id="rr-consistency-patch">
/* === Roots & Recipes Consistency Patch === */

/* 1. All buttons → pill shape */
button, [role="button"] {
  border-radius: 9999px !important;
}

/* 2. Remove uppercase from all button text */
button span, button, [role="button"] {
  text-transform: none !important;
  letter-spacing: normal !important;
}

/* 3. Primary buttons: enforce correct color & shape */
button.bg-primary, a.bg-primary {
  background-color: #86452a !important;
  border-radius: 9999px !important;
  color: #ffffff !important;
}

/* 4. Input fields: consistent rounding */
input, textarea, select {
  border-radius: 12px !important;
}

/* 5. Body background always warm cream */
body {
  background-color: #fff8f3 !important;
}

/* 8. Nav label text: override lowercase/uppercase transform */
nav a span:not(.material-symbols-outlined),
nav button span:not(.material-symbols-outlined) {
  text-transform: none !important;
  letter-spacing: normal !important;
}
</style>
<script id="rr-js-patch">document.addEventListener('DOMContentLoaded', function() {
  // 1. Fix nav label casing (Title Case), skip icon spans
  var LABEL_MAP = {
    'home':'Home','HOME':'Home','search':'Search','SEARCH':'Search',
    'create':'Create','CREATE':'Create','library':'Library','LIBRARY':'Library',
    'profile':'Profile','PROFILE':'Profile'
  };
  document.querySelectorAll('nav a span, nav button span, nav div > a > span').forEach(function(el) {
    if (el.classList.contains('material-symbols-outlined')) return;
    var t = el.textContent.trim();
    if (LABEL_MAP[t]) {
      el.textContent = LABEL_MAP[t];
      el.classList.remove('lowercase', 'uppercase');
    }
  });

  // 2. Fix ALL CAPS button text
  document.querySelectorAll('button span, button').forEach(function(el) {
    if (el.classList.contains('material-symbols-outlined')) return;
    if (el.children.length === 0) {
      var t = el.textContent.trim();
      if (t === t.toUpperCase() && t.length > 2 && /^[A-Z ]+$/.test(t)) {
        el.textContent = t.charAt(0) + t.slice(1).toLowerCase();
      }
    }
  });

  // 3. Standardize brand name in top bar: font, size, style
  var header = document.querySelector('header');
  if (header) {
    header.querySelectorAll('h1, h2, span, p').forEach(function(el) {
      if (el.children.length === 0) {
        var txt = el.textContent.trim();
        if (txt.indexOf('Roots') !== -1 && txt.indexOf('Recipes') !== -1) {
          el.style.fontFamily = "'Newsreader', serif";
          el.style.fontStyle = 'italic';
          el.style.fontSize = '1.125rem';
          el.style.fontWeight = '500';
          el.style.color = '#86452a';
          el.style.letterSpacing = '-0.01em';
          el.style.lineHeight = '1.5';
        }
      }
    });
  }
});</script>
